<article class="bm-card bm-card-calculator bm-card-calculator--cover">
  <div class="bm-card-calculator__media">
    <img
      src="{{image}}"
      alt=""
      width="290"
      height="160"
      loading="lazy"
      decoding="async"
    />
  </div>
  <div class="bm-card-calculator__body">
    <h3 class="bm-card-calculator__title">{{title}}</h3>
    <p class="bm-card-calculator__text">{{text}}</p>
    <a href="{{href}}" class="bm-button bm-button--secondary">
      {{cta}}
      <svg class="bm-icon bm-icon--sm" aria-hidden="true">
        <use href="#bm-icon-arrow-right" />
      </svg>
    </a>
  </div>
</article>
