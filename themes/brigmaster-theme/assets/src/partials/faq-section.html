<section id="{{sectionId}}" class="bm-section bm-faq-section" aria-labelledby="{{titleId}}">
  <div class="bm-container">
    <header class="bm-section-toolbar">
      <div class="bm-section-toolbar__main">
        <h2 id="{{titleId}}" class="bm-section-toolbar__title">{{title}}</h2>
      </div>
      <a class="bm-section-toolbar__link" href="{{linkHref}}">{{linkText}}</a>
    </header>
    <div class="bm-faq-grid" data-bm-component="accordion">
      {{itemsHtml}}
    </div>
  </div>
</section>
