<div class="bm-faq-grid__item bm-accordion__item">
  <button
    type="button"
    class="bm-accordion__trigger"
    id="faq-trigger-{{id}}"
    aria-expanded="false"
    aria-controls="faq-panel-{{id}}"
  >
    <span class="bm-accordion__title">{{question}}</span>
    <svg class="bm-icon bm-accordion__icon" aria-hidden="true">
      <use href="#bm-icon-chevron-down" />
    </svg>
  </button>
  <div id="faq-panel-{{id}}" class="bm-accordion__panel" role="region" aria-labelledby="faq-trigger-{{id}}">
    <div class="bm-accordion__panel-inner">
      <div class="bm-accordion__content">
        <p class="bm-accordion__text">{{answer}}</p>
      </div>
    </div>
  </div>
</div>
